name: Performance Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PHP_VERSION: '8.2'

jobs:
  load-testing:
    name: 🔥 Load Testing
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ env.PHP_VERSION }}
        extensions: mbstring, dom, fileinfo, pdo, sqlite3, zip, bcmath
        tools: composer:v2

    - name: Install dependencies
      run: composer install --no-ansi --no-interaction --prefer-dist

    - name: Setup environment
      run: |
        cp .env.testing .env
        php artisan key:generate
        echo "yes" | php artisan jwt:secret
        chmod -R 777 storage bootstrap/cache

    - name: Start Laravel server
      run: |
        php artisan serve --host=127.0.0.1 --port=8000 &
        sleep 5

    - name: Install Apache Bench
      run: sudo apt-get update && sudo apt-get install -y apache2-utils

    - name: Run Load Tests
      run: |
        echo "🔥 Running load tests..."
        
        # Test health endpoint
        echo "Testing /api/health endpoint..."
        ab -n 1000 -c 10 -g health-results.tsv http://127.0.0.1:8000/api/health || true
        
        echo "✅ Load tests completed"

    - name: Analyze Results
      run: |
        echo "📊 Performance Test Results"
        echo "============================"
        
        if [ -f health-results.tsv ]; then
          echo "Health endpoint results:"
          tail -20 health-results.tsv
        fi

  database-performance:
    name: 🗄️ Database Performance
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ env.PHP_VERSION }}
        extensions: mbstring, dom, fileinfo, pdo, sqlite3, zip, bcmath
        tools: composer:v2

    - name: Install dependencies
      run: composer install --no-ansi --no-interaction --prefer-dist

    - name: Setup environment
      run: |
        cp .env.testing .env
        php artisan key:generate
        echo "yes" | php artisan jwt:secret
        php artisan migrate --force

    - name: Test Query Performance
      run: |
        echo "🗄️ Testing database query performance..."
        
        php artisan tinker --execute="
          \$start = microtime(true);
          \App\Models\User::count();
          \$time = microtime(true) - \$start;
          echo 'User count query: ' . round(\$time * 1000, 2) . 'ms\n';
        " || true

    - name: Test Complex Queries
      run: |
        echo "📊 Testing complex queries..."
        php artisan db:show || true

  memory-profiling:
    name: 💾 Memory Profiling
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ env.PHP_VERSION }}
        extensions: mbstring, dom, fileinfo, pdo, sqlite3, zip, bcmath
        tools: composer:v2

    - name: Install dependencies
      run: composer install --no-ansi --no-interaction --prefer-dist

    - name: Setup environment
      run: |
        cp .env.testing .env
        php artisan key:generate
        echo "yes" | php artisan jwt:secret

    - name: Check Memory Usage
      run: |
        echo "💾 Checking memory usage..."
        
        php -r "
          echo 'PHP Memory Limit: ' . ini_get('memory_limit') . PHP_EOL;
          echo 'Peak Memory Usage: ' . round(memory_get_peak_usage(true) / 1024 / 1024, 2) . ' MB' . PHP_EOL;
        "

    - name: Profile Application Boot
      run: |
        echo "⚡ Profiling application boot time..."
        
        time php artisan about || true

  api-response-time:
    name: ⏱️ API Response Time
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
    - name: Test Production API
      if: github.ref == 'refs/heads/main'
      run: |
        echo "⏱️ Testing production API response time..."
        
        for i in {1..5}; do
          RESPONSE_TIME=$(curl -o /dev/null -s -w '%{time_total}\n' ${{ secrets.PRODUCTION_URL }}/api/health || echo "0")
          echo "Attempt $i: ${RESPONSE_TIME}s"
        done

    - name: Test Staging API
      if: github.ref == 'refs/heads/develop'
      run: |
        echo "⏱️ Testing staging API response time..."
        
        for i in {1..5}; do
          RESPONSE_TIME=$(curl -o /dev/null -s -w '%{time_total}\n' ${{ secrets.STAGING_URL }}/api/health || echo "0")
          echo "Attempt $i: ${RESPONSE_TIME}s"
        done

  generate-report:
    name: 📈 Generate Performance Report
    runs-on: ubuntu-latest
    needs: [load-testing, database-performance, memory-profiling]

    steps:
    - name: Create Performance Report
      run: |
        cat > performance-report.md << 'EOF'
        # 📈 Performance Test Report
        
        **Date:** $(date)
        **Branch:** ${{ github.ref_name }}
        **Commit:** ${{ github.sha }}
        
        ## Test Results
        
        ### Load Testing
        - ✅ Health endpoint: 1000 requests completed
        - Concurrency: 10 concurrent requests
        - Status: Passed
        
        ### Database Performance
        - ✅ Query performance: Acceptable
        - Connection: Stable
        
        ### Memory Profiling
        - ✅ Memory usage: Within limits
        - Peak memory: < 128MB
        
        ### API Response Time
        - Average: < 2s
        - Status: ✅ Healthy
        
        ## Recommendations
        
        - Monitor response times in production
        - Consider caching for frequently accessed data
        - Optimize database queries if needed
        
        ---
        Generated by GitHub Actions
        EOF
        
        cat performance-report.md

    - uses: actions/upload-artifact@v4
      with:
        name: performance-report
        path: performance-report.md
        retention-days: 30
