name: Pull Request Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  pr-title-check:
    name: Validate PR Title
    runs-on: ubuntu-latest
    # Ignorer les PRs Dependabot
    if: github.actor != 'dependabot[bot]'
    steps:
    - name: Check PR title format
      uses: amannn/action-semantic-pull-request@v5
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        types: |
          feat
          fix
          docs
          style
          refactor
          test
          chore
          ci
          build
          perf
          revert
        requireScope: false

  syntax-check:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    # Ignorer les PRs Dependabot
    if: github.actor != 'dependabot[bot]'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        tools: composer:v2

    - name: Cache Composer dependencies
      uses: actions/cache@v4
      with:
        path: vendor
        key: composer-8.2-${{ hashFiles('**/composer.lock') }}
        restore-keys: composer-8.2-

    - name: Install dependencies
      run: composer install --no-ansi --no-interaction --prefer-dist

    - name: PHP syntax check
      run: find app routes config -name "*.php" -print0 | xargs -0 -n1 php -l

    - name: Run PHPStan
      run: |
        composer require --dev phpstan/phpstan --no-interaction --quiet
        vendor/bin/phpstan analyse app --level=5 --no-progress || true

    - name: Check PSR-12 code style
      run: |
        composer require --dev squizlabs/php_codesniffer --no-interaction --quiet
        vendor/bin/phpcs --standard=PSR12 app || true

  pr-size-check:
    name: Check PR Size
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Check PR size
      run: |
        CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | wc -l)
        echo "Files changed: $CHANGED_FILES"
        if [ "$CHANGED_FILES" -gt 50 ]; then
          echo "⚠️ Warning: PR modifies more than 50 files"
        fi

  pr-comment:
    name: Add PR Comment
    runs-on: ubuntu-latest
    needs: [syntax-check]
    if: always() && github.actor != 'dependabot[bot]' && needs.syntax-check.result != 'skipped'
    steps:
    - name: Comment PR
      uses: actions/github-script@v7
      with:
        script: |
          const status = '${{ needs.syntax-check.result }}';
          const icon = status === 'success' ? '✅' : '❌';
          const message = `## 🤖 Automated PR Review\n\n${icon} Code Quality: **${status}**\n\n${status === 'success' ? '✨ All checks passed! Ready for review.' : '⚠️ Some checks failed. Please review the errors above.'}`;
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: message
          });

  # Job dédié pour auto-approuver les PRs Dependabot sûres
  dependabot-auto-approve:
    name: Auto-approve Dependabot PR
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    permissions:
      pull-requests: write
      contents: write
    steps:
    - name: Fetch Dependabot metadata
      id: metadata
      uses: dependabot/fetch-metadata@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Auto-approve minor and patch updates
      if: steps.metadata.outputs.update-type == 'version-update:semver-minor' || steps.metadata.outputs.update-type == 'version-update:semver-patch'
      run: gh pr review --approve "$PR_URL"
      env:
        PR_URL: ${{ github.event.pull_request.html_url }}
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Enable auto-merge for minor and patch updates
      if: steps.metadata.outputs.update-type == 'version-update:semver-minor' || steps.metadata.outputs.update-type == 'version-update:semver-patch'
      run: gh pr merge --auto --squash "$PR_URL"
      env:
        PR_URL: ${{ github.event.pull_request.html_url }}
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
