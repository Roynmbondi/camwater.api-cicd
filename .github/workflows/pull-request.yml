name: Pull Request Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # ─── Validation du titre (ignoré pour Dependabot) ─────────
  pr-title-check:
    name: Validate PR Title
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
    - uses: amannn/action-semantic-pull-request@v5
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        types: |
          feat
          fix
          docs
          style
          refactor
          test
          chore
          ci
          build
          perf
          revert
        requireScope: false

  # ─── Vérification syntaxe PHP (ignoré pour Dependabot) ────
  syntax-check:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'

    steps:
    - uses: actions/checkout@v4

    - uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        tools: composer:v2

    - uses: actions/cache@v4
      with:
        path: vendor
        key: composer-8.2-${{ hashFiles('**/composer.lock') }}
        restore-keys: composer-8.2-

    - name: Install dependencies
      run: composer install --no-ansi --no-interaction --prefer-dist

    - name: PHP syntax check
      run: find app routes config -name "*.php" -print0 | xargs -0 -n1 php -l

    - name: PHPStan
      run: |
        composer require --dev phpstan/phpstan --no-interaction --quiet
        vendor/bin/phpstan analyse app --level=5 --no-progress || true

    - name: PSR-12 style
      run: |
        composer require --dev squizlabs/php_codesniffer --no-interaction --quiet
        vendor/bin/phpcs --standard=PSR12 app || true

  # ─── Taille de la PR (ignoré pour Dependabot) ─────────────
  pr-size-check:
    name: Check PR Size
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Check size
      run: |
        FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | wc -l)
        echo "Files changed: $FILES"
        [ "$FILES" -gt 50 ] && echo "⚠️ Warning: more than 50 files changed" || true

  # ─── Commentaire automatique (ignoré pour Dependabot) ─────
  pr-comment:
    name: Add PR Comment
    runs-on: ubuntu-latest
    needs: [syntax-check]
    # Ce job ne tourne QUE si syntax-check a tourné (pas skipped)
    if: |
      always() &&
      github.actor != 'dependabot[bot]' &&
      needs.syntax-check.result != 'skipped'
    steps:
    - uses: actions/github-script@v7
      with:
        script: |
          const status = '${{ needs.syntax-check.result }}';
          const icon = status === 'success' ? '✅' : '❌';
          const msg = status === 'success'
            ? '✨ All checks passed! Ready for review.'
            : '⚠️ Some checks failed. Please review the errors above.';
          await github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## 🤖 Automated PR Review\n\n${icon} Code Quality: **${status}**\n\n${msg}`
          });

  # ─── Auto-approve Dependabot (minor + patch seulement) ────
  dependabot-auto-approve:
    name: Auto-approve Dependabot PR
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    permissions:
      pull-requests: write
      contents: write
    steps:
    - name: Fetch Dependabot metadata
      id: meta
      uses: dependabot/fetch-metadata@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Approve minor/patch updates
      if: |
        steps.meta.outputs.update-type == 'version-update:semver-minor' ||
        steps.meta.outputs.update-type == 'version-update:semver-patch'
      run: gh pr review --approve "$PR_URL"
      env:
        PR_URL: ${{ github.event.pull_request.html_url }}
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Enable auto-merge for minor/patch
      if: |
        steps.meta.outputs.update-type == 'version-update:semver-minor' ||
        steps.meta.outputs.update-type == 'version-update:semver-patch'
      run: gh pr merge --auto --squash "$PR_URL"
      env:
        PR_URL: ${{ github.event.pull_request.html_url }}
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
