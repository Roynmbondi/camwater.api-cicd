name: Pull Request Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # Validation du titre de la PR
  pr-title-check:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
    - name: Check PR title format
      uses: amannn/action-semantic-pull-request@v5
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        types: |
          feat
          fix
          docs
          style
          refactor
          test
          chore
        requireScope: false

  # Vérification des fichiers modifiés
  changed-files:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    outputs:
      php: ${{ steps.filter.outputs.php }}
      tests: ${{ steps.filter.outputs.tests }}
      config: ${{ steps.filter.outputs.config }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check changed files
      uses: dorny/paths-filter@v4
      id: filter
      with:
        filters: |
          php:
            - 'app/**/*.php'
            - 'routes/**/*.php'
            - 'config/**/*.php'
          tests:
            - 'tests/**/*.php'
          config:
            - 'composer.json'
            - 'composer.lock'
            - '.env.example'

  # Tests rapides pour les PRs
  quick-tests:
    name: Quick Tests
    runs-on: ubuntu-latest
    needs: changed-files
    if: needs.changed-files.outputs.php == 'true'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, dom, fileinfo, mysql
        tools: composer:v2

    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: vendor
        key: composer-${{ hashFiles('composer.lock') }}

    - name: Install dependencies
      run: composer install --no-ansi --no-interaction --prefer-dist

    - name: Run PHP syntax check
      run: find app -name "*.php" -print0 | xargs -0 -n1 php -l

    - name: Run PHPUnit (fast tests only)
      run: php artisan test --parallel --stop-on-failure

  # Analyse de code
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    needs: changed-files
    if: needs.changed-files.outputs.php == 'true'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        tools: composer:v2, cs2pr

    - name: Install dependencies
      run: composer install --no-ansi --no-interaction --prefer-dist

    - name: Check code style
      run: |
        composer require --dev squizlabs/php_codesniffer
        vendor/bin/phpcs --standard=PSR12 --report=checkstyle app | cs2pr

    - name: Run PHPStan
      run: |
        composer require --dev phpstan/phpstan
        vendor/bin/phpstan analyse app --level=5 --error-format=github

  # Vérification de la taille de la PR
  pr-size-check:
    name: Check PR Size
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Check PR size
      run: |
        CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | wc -l)
        CHANGED_LINES=$(git diff --stat origin/${{ github.base_ref }}...HEAD | tail -1 | awk '{print $4+$6}')
        
        echo "Files changed: $CHANGED_FILES"
        echo "Lines changed: $CHANGED_LINES"
        
        if [ $CHANGED_FILES -gt 50 ]; then
          echo "⚠️ Warning: PR modifies more than 50 files"
        fi
        
        if [ $CHANGED_LINES -gt 1000 ]; then
          echo "⚠️ Warning: PR has more than 1000 lines changed"
        fi

  # Commentaire automatique sur la PR
  pr-comment:
    name: Add PR Comment
    runs-on: ubuntu-latest
    needs: [quick-tests, code-quality]
    if: always()
    steps:
    - name: Comment PR
      uses: actions/github-script@v7
      with:
        script: |
          const testStatus = '${{ needs.quick-tests.result }}';
          const qualityStatus = '${{ needs.code-quality.result }}';
          
          let message = '## 🤖 Automated PR Review\n\n';
          message += `- Tests: ${testStatus === 'success' ? '✅' : '❌'}\n`;
          message += `- Code Quality: ${qualityStatus === 'success' ? '✅' : '❌'}\n`;
          
          if (testStatus === 'success' && qualityStatus === 'success') {
            message += '\n✨ All checks passed! Ready for review.';
          } else {
            message += '\n⚠️ Some checks failed. Please review the errors above.';
          }
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: message
          });
