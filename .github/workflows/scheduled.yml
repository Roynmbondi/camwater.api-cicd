name: Scheduled Maintenance

on:
  schedule:
    # Tous les jours à 2h du matin (UTC)
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  # Vérification des dépendances obsolètes
  dependency-check:
    name: Check Dependencies
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        tools: composer:v2

    - name: Check for outdated packages
      run: |
        composer outdated --direct --strict || true
        echo "---"
        npm outdated || true

    - name: Check for security vulnerabilities
      run: |
        composer audit || true

  # Vérification de la santé de l'application
  health-check:
    name: Application Health Check
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
    - name: Check production endpoint
      run: |
        if [ -n "${{ secrets.APP_URL }}" ]; then
          curl -f ${{ secrets.APP_URL }}/api/health || echo "⚠️ Health check failed"
        fi

    - name: Check API response time
      run: |
        if [ -n "${{ secrets.APP_URL }}" ]; then
          RESPONSE_TIME=$(curl -o /dev/null -s -w '%{time_total}' ${{ secrets.APP_URL }}/api/health)
          echo "Response time: ${RESPONSE_TIME}s"
          if (( $(echo "$RESPONSE_TIME > 2.0" | bc -l) )); then
            echo "⚠️ Warning: Response time is slow"
          fi
        fi

  # Nettoyage automatique
  cleanup:
    name: Cleanup Old Data
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
    - name: Cleanup old workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        repository: ${{ github.repository }}
        retain_days: 30
        keep_minimum_runs: 10

    - name: Cleanup old artifacts
      run: |
        echo "Cleaning up artifacts older than 7 days..."
        # Cette action nécessite un token avec les permissions appropriées

  # Rapport hebdomadaire
  weekly-report:
    name: Weekly Report
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && github.event.schedule == '0 2 * * 1'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Generate weekly statistics
      run: |
        echo "## 📊 Weekly Report"
        echo ""
        echo "### Commits this week"
        git log --since="1 week ago" --oneline | wc -l
        echo ""
        echo "### Contributors this week"
        git log --since="1 week ago" --format='%an' | sort -u
        echo ""
        echo "### Most changed files"
        git log --since="1 week ago" --name-only --pretty=format: | sort | uniq -c | sort -rn | head -10
