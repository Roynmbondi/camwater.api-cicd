name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        tools: composer:v2

    - name: Install dependencies
      run: composer install --no-ansi --no-interaction --no-progress --prefer-dist --optimize-autoloader --no-dev

    - name: Create deployment package
      run: |
        mkdir -p deploy
        tar -czf deploy/release.tar.gz \
          --exclude=node_modules \
          --exclude=tests \
          --exclude=.git \
          --exclude=.github \
          --exclude=storage/logs \
          --exclude=.env \
          .

    - name: Deploy to server via SSH
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.DEPLOY_HOST }}
        username: ${{ secrets.DEPLOY_USER }}
        key: ${{ secrets.DEPLOY_KEY }}
        port: ${{ secrets.DEPLOY_PORT || 22 }}
        source: "deploy/release.tar.gz"
        target: "/tmp/"

    - name: Execute deployment commands
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.DEPLOY_HOST }}
        username: ${{ secrets.DEPLOY_USER }}
        key: ${{ secrets.DEPLOY_KEY }}
        port: ${{ secrets.DEPLOY_PORT || 22 }}
        script: |
          set -e
          cd ${{ secrets.DEPLOY_PATH }}

          RELEASE_DIR="releases/$(date +%Y%m%d-%H%M%S)"
          mkdir -p "$RELEASE_DIR"
          tar -xzf /tmp/deploy/release.tar.gz -C "$RELEASE_DIR"

          ln -sfn "$RELEASE_DIR" current

          cd current
          cp ${{ secrets.DEPLOY_PATH }}/.env .env
          php artisan down
          php artisan migrate --force
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan optimize
          php artisan up

          cd ${{ secrets.DEPLOY_PATH }}/releases
          ls -t | tail -n +6 | xargs rm -rf || true

    - name: Rollback on failure
      if: failure()
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.DEPLOY_HOST }}
        username: ${{ secrets.DEPLOY_USER }}
        key: ${{ secrets.DEPLOY_KEY }}
        port: ${{ secrets.DEPLOY_PORT || 22 }}
        script: |
          cd ${{ secrets.DEPLOY_PATH }}
          PREVIOUS=$(ls -t releases | sed -n '2p')
          if [ -n "$PREVIOUS" ]; then
            ln -sfn "releases/$PREVIOUS" current
            cd current && php artisan up
          fi
