name: Laravel CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  # Job 1: Tests et validation du code
  tests:
    name: Tests & Code Quality
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php-version: ['8.2', '8.3']

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: camwater_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP ${{ matrix.php-version }}
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: mbstring, dom, fileinfo, mysql, pdo_mysql, zip, bcmath
        coverage: xdebug
        tools: composer:v2

    - name: Get Composer Cache Directory
      id: composer-cache
      run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

    - name: Cache Composer dependencies
      uses: actions/cache@v3
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: ${{ runner.os }}-composer-

    - name: Install Composer dependencies
      run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --optimize-autoloader

    - name: Copy .env file
      run: cp .env.example .env

    - name: Generate application key
      run: php artisan key:generate

    - name: Generate JWT secret
      run: php artisan jwt:secret

    - name: Set directory permissions
      run: chmod -R 777 storage bootstrap/cache

    - name: Run database migrations
      env:
        DB_CONNECTION: mysql
        DB_HOST: 127.0.0.1
        DB_PORT: 3306
        DB_DATABASE: camwater_test
        DB_USERNAME: root
        DB_PASSWORD: password
      run: php artisan migrate --force

    - name: Execute PHPUnit tests with coverage
      env:
        DB_CONNECTION: mysql
        DB_HOST: 127.0.0.1
        DB_PORT: 3306
        DB_DATABASE: camwater_test
        DB_USERNAME: root
        DB_PASSWORD: password
      run: php artisan test --coverage --min=70

    - name: Upload coverage reports
      if: matrix.php-version == '8.2'
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  # Job 2: Analyse de code statique
  code-analysis:
    name: Static Code Analysis
    runs-on: ubuntu-latest
    needs: tests

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, dom, fileinfo, mysql
        tools: composer:v2, phpstan, psalm

    - name: Install dependencies
      run: composer install --no-ansi --no-interaction --no-progress --prefer-dist

    - name: Run PHPStan
      run: |
        composer require --dev phpstan/phpstan --no-interaction
        vendor/bin/phpstan analyse app --level=5 --no-progress || true

    - name: Check code style (PSR-12)
      run: |
        composer require --dev squizlabs/php_codesniffer --no-interaction
        vendor/bin/phpcs --standard=PSR12 app || true

  # Job 3: Vérification de sécurité
  security:
    name: Security Checks
    runs-on: ubuntu-latest
    needs: tests

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        tools: composer:v2

    - name: Install dependencies
      run: composer install --no-ansi --no-interaction --no-progress --prefer-dist

    - name: Check for security vulnerabilities
      run: |
        composer require --dev enlightn/security-checker --no-interaction
        vendor/bin/security-checker security:check composer.lock || true

    - name: Run Laravel security audit
      run: php artisan config:cache && php artisan route:cache

  # Job 4: Build et validation
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: [tests, code-analysis, security]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        tools: composer:v2

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Composer dependencies
      run: composer install --no-ansi --no-interaction --no-progress --prefer-dist --optimize-autoloader --no-dev

    - name: Install NPM dependencies
      run: npm ci

    - name: Build assets
      run: npm run build

    - name: Generate Swagger documentation
      run: |
        cp .env.example .env
        php artisan key:generate
        php artisan l5-swagger:generate

    - name: Create deployment artifact
      run: |
        mkdir -p artifacts
        tar -czf artifacts/camwater-api-${{ github.sha }}.tar.gz \
          --exclude=node_modules \
          --exclude=tests \
          --exclude=.git \
          --exclude=.github \
          --exclude=storage/logs \
          .

    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: camwater-api-build
        path: artifacts/
        retention-days: 7

  # Job 5: Notification de succès
  notify:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: [build]
    if: success()

    steps:
    - name: Send success notification
      run: |
        echo "✅ Pipeline CI/CD completed successfully!"
        echo "Branch: ${{ github.ref_name }}"
        echo "Commit: ${{ github.sha }}"
        echo "Author: ${{ github.actor }}"
