name: Laravel CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
    # Ignorer les PRs Dependabot automatiquement
    types: [opened, synchronize, reopened]

jobs:
  tests:
    name: Tests PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest
    # Ne pas tourner sur les PRs Dependabot
    if: github.actor != 'dependabot[bot]'

    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.2', '8.3']

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: camwater_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP ${{ matrix.php-version }}
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: mbstring, dom, fileinfo, mysql, pdo_mysql, zip, bcmath, gd
        coverage: xdebug
        tools: composer:v2

    - name: Cache Composer dependencies
      uses: actions/cache@v5
      with:
        path: vendor
        key: composer-${{ matrix.php-version }}-${{ hashFiles('**/composer.lock') }}
        restore-keys: composer-${{ matrix.php-version }}-

    - name: Install Composer dependencies
      run: composer install --no-ansi --no-interaction --no-progress --prefer-dist --optimize-autoloader

    - name: Copy .env file
      run: cp .env.example .env

    - name: Generate application key
      run: php artisan key:generate

    - name: Generate JWT secret
      run: php artisan jwt:secret

    - name: Set directory permissions
      run: chmod -R 777 storage bootstrap/cache

    - name: Run database migrations
      env:
        DB_CONNECTION: mysql
        DB_HOST: 127.0.0.1
        DB_PORT: 3306
        DB_DATABASE: camwater_test
        DB_USERNAME: root
        DB_PASSWORD: password
      run: php artisan migrate --force

    - name: Execute PHPUnit tests
      env:
        DB_CONNECTION: mysql
        DB_HOST: 127.0.0.1
        DB_PORT: 3306
        DB_DATABASE: camwater_test
        DB_USERNAME: root
        DB_PASSWORD: password
      run: php artisan test

    - name: Upload coverage reports
      if: matrix.php-version == '8.2'
      uses: codecov/codecov-action@v4
      with:
        flags: unittests
        name: codecov-camwater
      continue-on-error: true

  code-analysis:
    name: Static Code Analysis
    runs-on: ubuntu-latest
    needs: tests
    if: github.actor != 'dependabot[bot]'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, dom, fileinfo, mysql
        tools: composer:v2

    - name: Cache Composer dependencies
      uses: actions/cache@v5
      with:
        path: vendor
        key: composer-8.2-${{ hashFiles('**/composer.lock') }}
        restore-keys: composer-8.2-

    - name: Install dependencies
      run: composer install --no-ansi --no-interaction --no-progress --prefer-dist

    - name: Run PHPStan
      run: |
        composer require --dev phpstan/phpstan --no-interaction --quiet
        vendor/bin/phpstan analyse app --level=5 --no-progress || true

    - name: Check PSR-12 code style
      run: |
        composer require --dev squizlabs/php_codesniffer --no-interaction --quiet
        vendor/bin/phpcs --standard=PSR12 app || true

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: tests
    if: github.actor != 'dependabot[bot]'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        tools: composer:v2

    - name: Install dependencies
      run: composer install --no-ansi --no-interaction --no-progress --prefer-dist

    - name: Run Composer audit
      run: composer audit || true

  build:
    name: Build Artifact
    runs-on: ubuntu-latest
    needs: [tests, code-analysis, security]
    if: github.actor != 'dependabot[bot]'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        tools: composer:v2

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Composer dependencies (production)
      run: composer install --no-ansi --no-interaction --no-progress --prefer-dist --optimize-autoloader --no-dev

    - name: Install NPM dependencies
      run: npm ci

    - name: Build assets
      run: npm run build

    - name: Generate Swagger documentation
      run: |
        cp .env.example .env
        php artisan key:generate
        php artisan l5-swagger:generate || true

    - name: Create artifact
      run: |
        mkdir -p artifacts
        tar -czf artifacts/camwater-api-${{ github.sha }}.tar.gz \
          --exclude=node_modules \
          --exclude=tests \
          --exclude=.git \
          --exclude=.github \
          --exclude=storage/logs \
          --exclude=.env \
          .

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: camwater-api-${{ github.sha }}
        path: artifacts/
        retention-days: 30
