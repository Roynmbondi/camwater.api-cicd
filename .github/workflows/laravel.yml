name: Laravel CI/CD Pipeline Complète

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

env:
  PHP_VERSION: '8.2'
  NODE_VERSION: '20'

jobs:
  # ============================================
  # PARTIE 1: CI/CD - BUILD & TESTS
  # ============================================
  
  linting:
    name: 🔍 Linting & Code Quality
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'

    steps:
    - uses: actions/checkout@v4

    - uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ env.PHP_VERSION }}
        extensions: mbstring, dom, fileinfo, pdo, sqlite3, zip, bcmath
        tools: composer:v2
        coverage: none

    - uses: actions/cache@v4
      with:
        path: vendor
        key: composer-${{ env.PHP_VERSION }}-${{ hashFiles('**/composer.lock') }}
        restore-keys: composer-${{ env.PHP_VERSION }}-

    - name: Install dependencies
      run: composer install --no-ansi --no-interaction --no-progress --prefer-dist

    - name: Laravel Pint (Code Style)
      run: ./vendor/bin/pint --test || true

    - name: PSR-12 Code Style Check
      run: |
        vendor/bin/phpcs --standard=PSR12 app --report=summary || true

  tests:
    name: 🧪 Tests PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'

    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.2', '8.3']

    steps:
    - uses: actions/checkout@v4

    - uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: mbstring, dom, fileinfo, pdo, pdo_sqlite, sqlite3, zip, bcmath, gd
        tools: composer:v2
        coverage: xdebug

    - uses: actions/cache@v4
      with:
        path: vendor
        key: composer-${{ matrix.php-version }}-${{ hashFiles('**/composer.lock') }}
        restore-keys: composer-${{ matrix.php-version }}-

    - name: Install dependencies
      run: composer install --no-ansi --no-interaction --no-progress --prefer-dist

    - name: Setup environment
      run: |
        cp .env.testing .env
        php artisan key:generate
        echo "yes" | php artisan jwt:secret
        chmod -R 777 storage bootstrap/cache

    - name: Run Unit Tests
      run: php artisan test --testsuite=Unit || true

    - name: Run Feature Tests
      run: php artisan test --testsuite=Feature || true

    - name: Generate Coverage Report
      if: matrix.php-version == '8.2'
      run: |
        php artisan test --coverage-html coverage-report || true
        echo "✅ Tests completed"

  static-analysis:
    name: 🔬 Static Code Analysis
    runs-on: ubuntu-latest
    needs: [linting, tests]
    if: github.actor != 'dependabot[bot]'

    steps:
    - uses: actions/checkout@v4

    - uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ env.PHP_VERSION }}
        tools: composer:v2

    - uses: actions/cache@v4
      with:
        path: vendor
        key: composer-${{ env.PHP_VERSION }}-${{ hashFiles('**/composer.lock') }}

    - name: Install dependencies
      run: composer install --no-ansi --no-interaction --no-progress --prefer-dist

    - name: PHPStan Analysis (Level 5)
      run: |
        vendor/bin/phpstan analyse app --level=5 --no-progress --error-format=table || true

    - name: Check for deprecated code
      run: |
        vendor/bin/phpstan analyse app --level=5 --no-progress | grep -i "deprecated" || echo "No deprecated code found"

  security-audit:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    needs: tests
    if: github.actor != 'dependabot[bot]'

    steps:
    - uses: actions/checkout@v4

    - uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ env.PHP_VERSION }}
        tools: composer:v2

    - name: Install dependencies
      run: composer install --no-ansi --no-interaction --no-progress --prefer-dist

    - name: Composer Security Audit
      run: composer audit --format=table || true

    - name: Check for known vulnerabilities
      run: |
        echo "🔍 Checking for security vulnerabilities..."
        composer audit --locked || echo "⚠️ Some vulnerabilities found"

    - name: Validate composer.json
      run: composer validate --strict

  build:
    name: 📦 Build Application
    runs-on: ubuntu-latest
    needs: [static-analysis, security-audit]
    if: github.actor != 'dependabot[bot]'

    steps:
    - uses: actions/checkout@v4

    - uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ env.PHP_VERSION }}
        tools: composer:v2

    - uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install PHP dependencies
      run: composer install --no-dev --no-ansi --no-interaction --prefer-dist --optimize-autoloader

    - name: Install Node dependencies
      run: npm ci --no-audit --no-fund

    - name: Build frontend assets
      run: npm run build

    - name: Generate API Documentation
      run: |
        cp .env.testing .env
        php artisan key:generate
        echo "yes" | php artisan jwt:secret
        php artisan l5-swagger:generate || true

    - name: Optimize Laravel
      run: |
        php artisan config:cache
        php artisan route:cache
        php artisan view:cache

    - name: Create deployment package
      run: |
        mkdir -p artifacts
        tar -czf artifacts/camwater-api-${{ github.sha }}.tar.gz \
          --exclude=node_modules \
          --exclude=tests \
          --exclude=.git \
          --exclude=.github \
          --exclude=storage/logs/*.log \
          --exclude=.env \
          --exclude=.env.example \
          .

    - uses: actions/upload-artifact@v4
      with:
        name: camwater-api-build
        path: artifacts/
        retention-days: 30

  # ============================================
  # PARTIE 2: MONITORING - Métriques & Logs
  # ============================================
  
  performance-metrics:
    name: 📊 Performance Metrics
    runs-on: ubuntu-latest
    needs: build
    if: github.actor != 'dependabot[bot]'

    steps:
    - uses: actions/checkout@v4

    - uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ env.PHP_VERSION }}
        tools: composer:v2

    - name: Install dependencies
      run: composer install --no-ansi --no-interaction --prefer-dist

    - name: Setup environment
      run: |
        cp .env.testing .env
        php artisan key:generate
        echo "yes" | php artisan jwt:secret

    - name: Measure application boot time
      run: |
        echo "⏱️ Measuring application performance..."
        time php artisan about || true

    - name: Check routes performance
      run: |
        echo "🛣️ Analyzing routes..."
        php artisan route:list --compact || true

    - name: Generate performance report
      run: |
        echo "📈 Performance Metrics Report" > performance-report.txt
        echo "================================" >> performance-report.txt
        echo "Build: ${{ github.sha }}" >> performance-report.txt
        echo "Date: $(date)" >> performance-report.txt
        echo "PHP Version: ${{ env.PHP_VERSION }}" >> performance-report.txt
        echo "" >> performance-report.txt
        php artisan about >> performance-report.txt || true

    - uses: actions/upload-artifact@v4
      with:
        name: performance-report
        path: performance-report.txt
        retention-days: 30

  # ============================================
  # PARTIE 3: DEPLOYMENT - O2Switch
  # ============================================
  
  deploy-staging:
    name: 🚀 Deploy to Staging (O2Switch via FTP)
    runs-on: ubuntu-latest
    needs: [build, performance-metrics]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: staging

    steps:
    - uses: actions/checkout@v4

    - uses: actions/download-artifact@v4
      with:
        name: camwater-api-build
        path: artifacts/

    - name: Extract artifact
      run: |
        mkdir -p deploy
        cd artifacts
        tar -xzf camwater-api-${{ github.sha }}.tar.gz -C ../deploy
        cd ..

    - name: Deploy via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        protocol: ftps
        port: 21
        local-dir: ./deploy/
        server-dir: ${{ secrets.STAGING_PATH }}/
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/tests/**
          **/.env

    - name: Run post-deployment commands via FTP
      run: |
        echo "✅ Files uploaded to staging"
        echo "⚠️ Note: Run these commands manually in cPanel Terminal:"
        echo "cd ${{ secrets.STAGING_PATH }}"
        echo "php artisan migrate --force"
        echo "php artisan config:cache"
        echo "php artisan route:cache"
        echo "php artisan optimize"

    - name: Health Check
      run: |
        sleep 10
        curl -f ${{ secrets.STAGING_URL }}/api/health || echo "⚠️ Health check failed"

  deploy-production:
    name: 🎯 Deploy to Production (O2Switch via FTP)
    runs-on: ubuntu-latest
    needs: [build, performance-metrics]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production

    steps:
    - uses: actions/checkout@v4

    - uses: actions/download-artifact@v4
      with:
        name: camwater-api-build
        path: artifacts/

    - name: Extract artifact
      run: |
        mkdir -p deploy
        cd artifacts
        tar -xzf camwater-api-${{ github.sha }}.tar.gz -C ../deploy
        cd ..

    - name: Deploy via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        protocol: ftps
        port: 21
        local-dir: ./deploy/
        server-dir: ${{ secrets.PRODUCTION_PATH }}/
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/tests/**
          **/.env

    - name: Run post-deployment commands via FTP
      run: |
        echo "✅ Files uploaded to production"
        echo "⚠️ Note: Run these commands manually in cPanel Terminal:"
        echo "cd ${{ secrets.PRODUCTION_PATH }}"
        echo "php artisan migrate --force"
        echo "php artisan config:cache"
        echo "php artisan route:cache"
        echo "php artisan optimize"

    - name: Health Check
      run: |
        sleep 15
        curl -f ${{ secrets.PRODUCTION_URL }}/api/health || echo "⚠️ Health check failed"

    - name: Notify Success
      if: success()
      run: |
        echo "✅ Deployment to production successful!"
        echo "🌐 URL: ${{ secrets.PRODUCTION_URL }}"
