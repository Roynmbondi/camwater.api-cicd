name: Laravel CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
    types: [opened, synchronize, reopened]

jobs:
  tests:
    name: Tests PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'

    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.2', '8.3']

    steps:
    - uses: actions/checkout@v4

    - uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: mbstring, dom, fileinfo, pdo, pdo_sqlite, sqlite3, zip, bcmath, gd
        tools: composer:v2

    - uses: actions/cache@v4
      with:
        path: vendor
        key: composer-${{ matrix.php-version }}-${{ hashFiles('**/composer.lock') }}
        restore-keys: composer-${{ matrix.php-version }}-

    - name: Install dependencies
      run: composer install --no-ansi --no-interaction --no-progress --prefer-dist

    - name: Setup environment
      run: |
        cp .env.example .env
        php artisan key:generate
        php artisan jwt:secret
        chmod -R 777 storage bootstrap/cache

    - name: Run tests
      run: php artisan test

  code-analysis:
    name: Static Code Analysis
    runs-on: ubuntu-latest
    needs: tests
    if: github.actor != 'dependabot[bot]'

    steps:
    - uses: actions/checkout@v4

    - uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        tools: composer:v2

    - uses: actions/cache@v4
      with:
        path: vendor
        key: composer-8.2-${{ hashFiles('**/composer.lock') }}
        restore-keys: composer-8.2-

    - name: Install dependencies
      run: composer install --no-ansi --no-interaction --no-progress --prefer-dist

    - name: PHPStan
      run: |
        composer require --dev phpstan/phpstan --no-interaction --quiet
        vendor/bin/phpstan analyse app --level=5 --no-progress || true

    - name: PSR-12 style check
      run: |
        composer require --dev squizlabs/php_codesniffer --no-interaction --quiet
        vendor/bin/phpcs --standard=PSR12 app || true

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: tests
    if: github.actor != 'dependabot[bot]'

    steps:
    - uses: actions/checkout@v4

    - uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        tools: composer:v2

    - name: Install dependencies
      run: composer install --no-ansi --no-interaction --no-progress --prefer-dist

    - name: Composer audit
      run: composer audit || true

  build:
    name: Build Artifact
    runs-on: ubuntu-latest
    needs: [tests, code-analysis, security]
    if: github.actor != 'dependabot[bot]'

    steps:
    - uses: actions/checkout@v4

    - uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        tools: composer:v2

    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: |
        composer install --no-dev --no-ansi --no-interaction --prefer-dist --optimize-autoloader
        npm ci --no-audit --no-fund

    - name: Build assets
      run: npm run build

    - name: Generate Swagger docs
      run: |
        cp .env.example .env
        php artisan key:generate
        php artisan l5-swagger:generate || true

    - name: Package artifact
      run: |
        mkdir -p artifacts
        tar -czf artifacts/camwater-api-${{ github.sha }}.tar.gz \
          --exclude=node_modules --exclude=tests \
          --exclude=.git --exclude=.github \
          --exclude=storage/logs --exclude=.env .

    - uses: actions/upload-artifact@v4
      with:
        name: camwater-api-${{ github.sha }}
        path: artifacts/
        retention-days: 30
