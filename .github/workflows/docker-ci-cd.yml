name: Docker CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main, master, develop ]
    types: [opened, synchronize, reopened]

jobs:
  # ─── Job 1: Tests PHP + qualité de code ───────────────────
  test:
    name: Tests & Quality Checks
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: camwater_test
        ports: [ "3306:3306" ]
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports: [ "6379:6379" ]
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
    - uses: actions/checkout@v4

    - uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, dom, fileinfo, mysql, pdo_mysql, redis, zip, bcmath, gd
        tools: composer:v2

    - uses: actions/cache@v4
      with:
        path: vendor
        key: composer-8.2-${{ hashFiles('**/composer.lock') }}
        restore-keys: composer-8.2-

    - name: Install dependencies
      run: composer install --no-ansi --no-interaction --no-progress --prefer-dist

    - name: Setup environment
      run: |
        cp .env.example .env
        php artisan key:generate
        php artisan jwt:secret
        chmod -R 777 storage bootstrap/cache

    - name: Run migrations
      env:
        DB_CONNECTION: mysql
        DB_HOST: 127.0.0.1
        DB_PORT: 3306
        DB_DATABASE: camwater_test
        DB_USERNAME: root
        DB_PASSWORD: password
        REDIS_HOST: 127.0.0.1
        REDIS_PORT: 6379
      run: php artisan migrate --force

    - name: Run tests
      env:
        DB_CONNECTION: mysql
        DB_HOST: 127.0.0.1
        DB_PORT: 3306
        DB_DATABASE: camwater_test
        DB_USERNAME: root
        DB_PASSWORD: password
        REDIS_HOST: 127.0.0.1
        REDIS_PORT: 6379
      run: php artisan test

    - name: PHPStan analysis
      run: |
        composer require --dev phpstan/phpstan --no-interaction --quiet
        vendor/bin/phpstan analyse app --level=5 --no-progress || true

    - name: PSR-12 code style
      run: |
        composer require --dev squizlabs/php_codesniffer --no-interaction --quiet
        vendor/bin/phpcs --standard=PSR12 app || true

  # ─── Job 2: Créer l'artifact ──────────────────────────────
  create-artifact:
    name: Create Application Artifact
    runs-on: ubuntu-latest
    needs: test
    if: github.actor != 'dependabot[bot]'

    steps:
    - uses: actions/checkout@v4

    - uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        tools: composer:v2

    - uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install & build
      run: |
        composer install --no-dev --no-ansi --no-interaction --prefer-dist --optimize-autoloader
        npm ci --no-audit --no-fund
        npm run build

    - name: Generate Swagger docs
      run: |
        cp .env.example .env
        php artisan key:generate
        php artisan l5-swagger:generate || true

    - name: Package artifact
      run: |
        mkdir -p artifacts
        tar -czf artifacts/camwater-api-${{ github.sha }}.tar.gz \
          --exclude=node_modules --exclude=tests \
          --exclude=.git --exclude=.github \
          --exclude=storage/logs --exclude=.env .

    - uses: actions/upload-artifact@v4
      with:
        name: camwater-api-${{ github.sha }}
        path: artifacts/
        retention-days: 30

  # ─── Job 3: Build & Push Docker Hub (push uniquement) ─────
  docker-build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.actor != 'dependabot[bot]'

    steps:
    - uses: actions/checkout@v4

    - uses: docker/setup-qemu-action@v3

    - uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker image name
      id: vars
      run: |
        IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/camwater-api"
        echo "image=$IMAGE" >> $GITHUB_OUTPUT

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ steps.vars.outputs.image }}
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
